name: AWS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  APP_NAME: villa-booking

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.build.outputs.backend_image }}
      frontend_image: ${{ steps.build.outputs.frontend_image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/backend/Dockerfile

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$APP_NAME-backend:latest -f app/backend/Dockerfile ./app/backend
          docker build -t $ECR_REGISTRY/$APP_NAME-frontend:latest -f app/frontend/Dockerfile ./app/frontend
          docker push $ECR_REGISTRY/$APP_NAME-backend:latest
          docker push $ECR_REGISTRY/$APP_NAME-frontend:latest
          echo "backend_image=$ECR_REGISTRY/$APP_NAME-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend_image=$ECR_REGISTRY/$APP_NAME-frontend:latest" >> $GITHUB_OUTPUT

  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}-backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}-frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL

  deploy:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Backend to ECS
        run: |
          aws ecs update-service \
            --cluster $APP_NAME-cluster \
            --service $APP_NAME-backend \
            --force-new-deployment

      - name: Deploy Frontend to ECS
        run: |
          aws ecs update-service \
            --cluster $APP_NAME-cluster \
            --service $APP_NAME-frontend \
            --force-new-deployment
